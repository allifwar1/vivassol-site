<style>
  :root {
    --rainbow: linear-gradient(90deg,#E84525,#F5801A,#F5C200,#68B82A,#00A88A,#1A7ACA,#7B2DBE,#D02060);
    /* tweakable feel — defaults = “Equilibrado / Geométrico” */
    --display-font: 'Sora';
    --float-amp: 22px;
    --float-amp2: 16px;
    --float-dur: 6s;
    --lift: -10px;
  }
  * { -webkit-font-smoothing: antialiased; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; color: #111118; background: #FAFAFA; }
  ::selection { background: #F5C200; color: #111118; }
  .font-sora { font-family: var(--display-font, 'Sora'), 'Sora', sans-serif !important; }
  .rainbow-text { background: var(--rainbow); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .rainbow-bg { background: var(--rainbow); }
  .rainbow-border { position: relative; }
  .rainbow-border::after { content:''; position:absolute; left:0; bottom:0; height:4px; width:100%; background: var(--rainbow); border-radius: 99px; }

  /* image-slot baseline */
  image-slot { display:block; }

  /* scrollbar — esconde no mobile */
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-thumb { background: #d9d9e0; border-radius: 99px; }
  @media (max-width: 768px) {
    ::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
  }

  /* ---------- hero entrance animations (gated on .is-active) ---------- */
  @media (prefers-reduced-motion: no-preference) {
    /* slide 0 — fade rise */
    .anim-rise > * { opacity:0; transform: translateY(40px); }
    .is-active.anim-rise > * { animation: rise .9s cubic-bezier(.16,1,.3,1) forwards; }
    @keyframes rise { to { opacity:1; transform:none; } }

    /* slide 1 — slide from sides */
    .anim-side .from-left { opacity:0; transform: translateX(-60px); }
    .anim-side .from-right { opacity:0; transform: translateX(70px); }
    .is-active.anim-side .from-left { animation: slideX .95s cubic-bezier(.16,1,.3,1) forwards; }
    .is-active.anim-side .from-right { animation: slideX 1s cubic-bezier(.16,1,.3,1) .08s forwards; }
    @keyframes slideX { to { opacity:1; transform:none; } }

    /* slide 2 — clip wipe reveal */
    .anim-wipe > * { clip-path: inset(0 100% 0 0); opacity:0; }
    .is-active.anim-wipe > * { animation: wipe 1s cubic-bezier(.7,0,.2,1) forwards; }
    @keyframes wipe { to { clip-path: inset(0 0 0 0); opacity:1; } }

    /* slide 3 — pop bounce */
    .anim-pop > * { opacity:0; transform: scale(.7); }
    .is-active.anim-pop > * { animation: pop .8s cubic-bezier(.34,1.56,.64,1) forwards; }
    @keyframes pop { to { opacity:1; transform:none; } }

    /* slide 4 — blur zoom */
    .anim-blur > * { opacity:0; transform: scale(1.08); filter: blur(14px); }
    .is-active.anim-blur > * { animation: blurin 1.1s cubic-bezier(.16,1,.3,1) forwards; }
    @keyframes blurin { to { opacity:1; transform:none; filter:none; } }
  @keyframes progressFill { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes progressRetract { from { transform: scaleX(1); } to { transform: scaleX(0); } }

    .stagger > *:nth-child(1){ animation-delay:.05s; }
    .stagger > *:nth-child(2){ animation-delay:.18s; }
    .stagger > *:nth-child(3){ animation-delay:.32s; }
    .stagger > *:nth-child(4){ animation-delay:.46s; }

    @keyframes floaty { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(calc(var(--float-amp, 22px) * -1)) } }
    @keyframes floaty2 { 0%,100%{ transform: translateY(0) } 50%{ transform: translateY(var(--float-amp2, 16px)) } }
    @keyframes spinslow { to { transform: rotate(360deg) } }
    @keyframes drift { 0%,100%{ transform: translate(0,0) } 50%{ transform: translate(18px,-14px) } }
    .float { animation: floaty var(--float-dur, 6s) ease-in-out infinite; }
    .float2 { animation: floaty2 calc(var(--float-dur, 6s) + 1s) ease-in-out infinite; }
    .spin { animation: spinslow 36s linear infinite; }
  }

  .reveal { opacity:0; transform: translateY(34px); transition: opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1); }
  .reveal.shown { opacity:1; transform:none; }

  .lift { transition: transform .45s cubic-bezier(.16,1,.3,1), box-shadow .45s ease; }
  .lift:hover { transform: translateY(var(--lift, -10px)); }

  /* ---- caneca 3D: tamanho responsivo ---- */
  .hero-mv { width: 460px; height: 550px; }
  @media (max-width: 768px) {
    .hero-mv { width: 230px; height: 290px; }

<script type="text/babel" data-presets="react">

/* ----------------------- tweak config ----------------------- */
// mistura uma cor com branco (amt 0..1) — deriva os tons de fundo das cores de acento
function lighten(hex, amt) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const h = (c) => Math.round(c + (255 - c) * amt).toString(16).padStart(2,'0');
  return `#${h(r)}${h(g)}${h(b)}`;
}

/* ----------------------------- data ----------------------------- */
const SLIDES = [

{

/* ----------------------------- icons ----------------------------- */
function Icon({ name, className, style }) {
  const common = { fill: "none", stroke: "currentColor", strokeWidth: 1.6, strokeLinecap: "round", strokeLinejoin: "round", viewBox: "0 0 24 24", className, style };
  switch (name) {
    case "hand":return <svg {...common}><path d="M7 11V6.5a1.5 1.5 0 0 1 3 0V11m0 0V5a1.5 1.5 0 0 1 3 0v6m0 0V6.5a1.5 1.5 0 0 1 3 0V13c0 4-2.5 7-6 7s-6-2.5-6-6v-1.5a1.5 1.5 0 0 1 3 0V13" /></svg>;
    case "spark":return <svg {...common}><path d="M12 3v4M12 17v4M3 12h4M17 12h4M6 6l2.5 2.5M15.5 15.5 18 18M18 6l-2.5 2.5M8.5 15.5 6 18" /></svg>;
    case "eye":return <svg {...common}><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" /><circle cx="12" cy="12" r="3" /></svg>;
    case "truck":return <svg {...common}><path d="M3 6h10v9H3zM13 9h4l3 3v3h-7z" /><circle cx="7" cy="18" r="1.6" /><circle cx="17" cy="18" r="1.6" /></svg>;
    case "arrow":return <svg {...common}><path d="M5 12h14M13 6l6 6-6 6" /></svg>;
    case "left":return <svg {...common}><path d="M15 6l-6 6 6 6" /></svg>;
    case "right":return <svg {...common}><path d="M9 6l6 6-6 6" /></svg>;

    case "insta":return <svg {...common}><rect x="3" y="3" width="18" height="18" rx="5" /><circle cx="12" cy="12" r="4" /><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none" /></svg>;

/* ----------------------------- logo ----------------------------- */
function Logo({ light, size = 40 }) {

}

/* --------------------------- 3D model (hover gira) --------------------------- */
function HeroModel({ slide, rot }) {
  const mv = useRef(null);
  const wrapper = useRef(null);

  // ângulo de nascimento: vista frontal levemente elevada
  const START = "-10deg 72deg 88%";

  // sempre girando — desktop e mobile
  useEffect(() => {
    const el = mv.current; if (!el) return;
    el.setAttribute('auto-rotate', '');
  }, []);

  const onEnter = () => {};
  const onLeave = () => {};

  return (
    <div className="relative" ref={wrapper}
    onMouseEnter={onEnter} onMouseLeave={onLeave}>
      {/* glow de fundo */}
      <div className="absolute inset-0 rounded-full blur-3xl opacity-40 pointer-events-none"
      style={{ background: `radial-gradient(circle, ${slide.accent}66, transparent 65%)`, transform: 'scale(.85)' }} />

      <model-viewer
        ref={mv}
        class="hero-mv"
        src={slide.model}
        camera-controls
        disable-zoom
        disable-pan
        touch-action="pan-y"
        interaction-prompt="none"
        camera-orbit={START}
        field-of-view="28deg"
        rotation-per-second={rot || "-20deg"}
        auto-rotate-delay="0"
        environment-image="neutral"
        exposure="1.1"
        shadow-intensity="1.2"
        shadow-softness="0.8"
        style={{
          background: 'transparent',
          '--poster-color': 'transparent',
          filter: `drop-shadow(0 40px 60px ${slide.accent}55)`

      </model-viewer>

      {/* badge de produto */}
      <div className="absolute -bottom-3 left-1/2 -translate-x-1/2 rounded-2xl px-5 py-2 font-sora font-bold text-white text-sm shadow-xl whitespace-nowrap"
      style={{ background: `linear-gradient(135deg, ${slide.accent}, ${slide.accent2})` }}>
        {slide.tag} Personalizada
      </div>
    </div>);

}

/* --------------------------- hero art --------------------------- */
function HeroArt({ slide, rot }) {
  const { art, accent, accent2, slot, model } = slide;
  // tilt 3D suave seguindo o mouse (funciona com a foto que você soltar)
  const tilt = useRef(null);
  const onMove = (e) => {
    const el = tilt.current;if (!el) return;
    const r = el.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width - 0.5;
    const py = (e.clientY - r.top) / r.height - 0.5;
    el.style.transform = `perspective(900px) rotateY(${px * 16}deg) rotateX(${-py * 14}deg)`;
  };
  const onLeave = () => {if (tilt.current) tilt.current.style.transform = 'perspective(900px) rotateY(0deg) rotateX(0deg)';};
  return (
    <div className="relative w-full flex items-center justify-center" style={{ minHeight: 480 }}>
      {/* glow pedestal */}
      <div className="absolute rounded-full blur-3xl opacity-50"
      style={{ width: 420, height: 420, background: `radial-gradient(circle, ${accent}55, transparent 65%)` }} />
      <div className="absolute bottom-6 rounded-[50%] blur-xl opacity-40"
      style={{ width: 340, height: 46, background: `radial-gradient(ellipse, ${accent}, transparent 70%)` }} />

      {/* floating accent shapes */}
      <div className="absolute float" style={{ top: '8%', left: '12%' }}>
        <div className="rounded-2xl" style={{ width: 54, height: 54, background: accent2, opacity: .85, transform: 'rotate(12deg)' }} />
      </div>
      <div className="absolute float2" style={{ bottom: '14%', right: '10%' }}>
        <div className="rounded-full" style={{ width: 30, height: 30, background: accent }} />
      </div>
      <div className="absolute float2" style={{ top: '18%', right: '18%' }}>
        <div className="rounded-full" style={{ width: 14, height: 14, background: accent2, opacity: .7 }} />
      </div>

      {/* central object */}
      {art === "brand" ?
      <div className="relative flex items-center justify-center">
          <img src={SYMBOL} className="spin" style={{ width: 300, height: 300, filter: 'drop-shadow(0 30px 60px rgba(0,0,0,.16))' }} draggable="false" />
        </div> :
      model ? (
      /* 3D real quando há um .glb definido neste slide */
      <HeroModel slide={slide} rot={rot} />) :

      <div className="relative float">
          <div ref={tilt} onMouseMove={onMove} onMouseLeave={onLeave}
        className="rounded-[34px] bg-white shadow-2xl overflow-hidden"
        style={{ width: 330, height: 400, boxShadow: '0 40px 90px -30px rgba(17,17,24,.35)', transition: 'transform .25s cubic-bezier(.16,1,.3,1)', willChange: 'transform' }}>

          style={{ width: '100%', height: '100%' }}></image-slot>
          </div>
          {/* color chip badge */}
          <div className="absolute -bottom-4 -left-4 rounded-2xl px-4 py-2 font-sora font-bold text-white text-sm shadow-lg"
        style={{ background: `linear-gradient(135deg, ${accent}, ${accent2})` }}>
            {slide.tag}
          </div>
        </div>
      }
    </div>);

}

/* ----------------------------- hero ----------------------------- */
const RETRACT_MS = 420;

function Hero({ slides, fillMs, rot }) {
  const [i, setI] = useState(0);
  const [paused, setPaused] = useState(false);
  const [retractIdx, setRetractIdx] = useState(null);
  const iRef = useRef(0);       // sempre atualizado, sem stale closure
  const n = slides.length;

  // changeSlide: não depende de `i` diretamente — usa iRef para evitar closure stale
  const changeSlide = useCallback((newIdx) => {
    const cur = iRef.current;
    setRetractIdx(cur);
    setTimeout(() => {
      const next = ((newIdx % n) + n) % n;
      iRef.current = next;
      setRetractIdx(null);
      setI(next);
    }, RETRACT_MS);
  }, [n]);

  const go = useCallback((d) => changeSlide(iRef.current + d), [changeSlide]);
  const at = useCallback((k) => { if (k !== iRef.current) changeSlide(k); }, [changeSlide]);

  useEffect(() => {
    if (paused) return;
    const t = setTimeout(() => go(1), fillMs);
    return () => clearTimeout(t);
  }, [i, paused, go]);

  const s = slides[i];

  return (
    <section id="top" className="relative overflow-hidden" style={{ minHeight: '100vh' }}
    onMouseEnter={() => setPaused(true)} onMouseLeave={() => setPaused(false)}>
      {/* stacked cross-fade backgrounds */}
      {slides.map((sl, k) =>
      <div key={k} className="absolute inset-0 transition-opacity duration-[1100ms]"
      style={{
        opacity: k === i ? 1 : 0,
        background: `linear-gradient(165deg, ${sl.tint} 0%, ${sl.tint2} 38%, #FAFAFA 86%)`
      }} />
      )}

/* ----------------------------- reveal wrapper ----------------------------- */
function Reveal({ children, delay = 0, className = "" }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) {setTimeout(() => el.classList.add('shown'), delay);io.disconnect();}
    }, { threshold: 0.18 });
    io.observe(el);
    return () => io.disconnect();
  }, [delay]);
  return <div ref={ref} className={`reveal ${className}`}>{children}</div>;
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "atmosfera": "Arco-íris",
  "energia": "Vibrante",
  "voz": "Elegante"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const energy = ENERGIAS[t.energia] || ENERGIAS['Equilibrado'];

  // recolore os slides do hero conforme a Atmosfera escolhida
  const slides = useMemo(() => {
    const pal = ATMOSFERAS[t.atmosfera] || ATMOSFERAS['Arco-íris'];
    return SLIDES.map((s, k) => {
      const [a, a2] = pal[k];
      return { ...s, accent: a, accent2: a2, tint: lighten(a, 0.82), tint2: lighten(a2, 0.80) };
    });
  }, [t.atmosfera]);

  // aplica Energia (movimento) e Voz (fonte) via CSS variables no documento
  useEffect(() => {
    const r = document.documentElement.style;
    r.setProperty('--float-amp', energy.floatAmp);
    r.setProperty('--float-amp2', energy.floatAmp2);
    r.setProperty('--float-dur', energy.floatDur);
    r.setProperty('--lift', energy.lift);
    r.setProperty('--display-font', VOZES[t.voz] || "'Sora'");
  }, [t.energia, t.voz, energy]);

  return (
    <div>
      <Navbar />
      <Hero slides={slides} fillMs={energy.fillMs} rot={energy.rot} />
      <Diferenciais />
      <DoisMundos />
      <Vitrine />
      <CTABand />
      <Footer />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Atmosfera" />
        <TweakColor label="Paleta do hero" value={ATM_SWATCHES[ATM_NAMES.indexOf(t.atmosfera)] || ATM_SWATCHES[0]}
                    options={ATM_SWATCHES}
                    onChange={(arr) => {
                      const idx = ATM_SWATCHES.findIndex((s) => s.join() === arr.join());
                      if (idx >= 0) setTweak('atmosfera', ATM_NAMES[idx]);
                    }} />
        <TweakRadio label="" value={t.atmosfera}
                    options={ATM_NAMES}
                    onChange={(v) => setTweak('atmosfera', v)} />

        <TweakSection label="Energia" />
        <TweakRadio label="Movimento" value={t.energia}
                    options={['Suave', 'Equilibrado', 'Vibrante']}
                    onChange={(v) => setTweak('energia', v)} />

        <TweakSection label="Voz" />
        <TweakRadio label="Títulos" value={t.voz}
                    options={['Geométrico', 'Elegante', 'Divertido']}
                    onChange={(v) => setTweak('voz', v)} />
      </TweaksPanel>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
